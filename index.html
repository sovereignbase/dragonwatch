<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="dark" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sovereignbase drag and watch demo</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif;
        background: #000;
        color: #fff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(
            circle at top,
            rgba(255, 255, 255, 0.1),
            transparent 36%
          ),
          #000;
        color: #fff;
      }

      main {
        width: min(100%, 42rem);
        margin: 0 auto;
        padding: 1.25rem;
      }

      .shell {
        display: grid;
        gap: 1.25rem;
        padding: 1.25rem;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 1.25rem;
        background: rgba(255, 255, 255, 0.04);
        box-shadow: 0 1rem 3rem rgba(0, 0, 0, 0.45);
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 8vw, 3.4rem);
        line-height: 0.95;
      }

      .lede {
        margin: 0;
        color: rgba(255, 255, 255, 0.76);
        line-height: 1.6;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(3, 100px);
        justify-content: center;
        gap: 12px;
        touch-action: none;
      }

      .controls > div {
        display: grid;
        place-items: center;
        width: 100px;
        height: 100px;
        border: 1px solid #fff;
        background: #000;
        color: #fff;
        font: 700 2rem system-ui;
        position: relative;
        transition: transform 0.18s ease;
        user-select: none;
      }

      .controls > div[data-dragging='true'] {
        z-index: 1;
      }

      .controls > div[data-dragging='true'],
      .controls > div[data-no-transition='true'] {
        transition: none;
      }

      .target-demos {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 1.5rem;
      }

      .target-demo {
        display: grid;
        gap: 0.75rem;
        width: max-content;
      }

      .target-row {
        display: grid;
        grid-template-columns: repeat(3, 8.5rem);
        gap: 0.75rem;
      }

      .target-slot {
        width: 8.5rem;
        height: 4.5rem;
      }

      .target-box {
        display: grid;
        place-items: center;
        width: 100%;
        height: 100%;
        padding: 0.75rem;
        border: 1px solid #fff;
        background: #000;
        color: #fff;
        font-weight: 700;
        text-align: center;
        touch-action: none;
      }

      [data-target] {
        position: relative;
        overflow: hidden;
      }

      [data-target][data-intersecting='true'] {
        border-color: #20f36b;
        box-shadow: 0 0 0 2px rgba(32, 243, 107, 0.35);
      }

      [data-target] > [data-dragged] {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
        background: #000;
        z-index: 1;
      }

      .target-demo button {
        width: 100%;
        padding: 0.7rem 1rem;
        border: 1px solid #fff;
        border-radius: 0;
        background: #000;
        color: #fff;
        font: inherit;
        font-weight: 700;
      }

      label {
        display: grid;
        gap: 0.55rem;
        font-size: 0.95rem;
      }

      input,
      button,
      a {
        border-radius: 999px;
      }

      input {
        width: 100%;
        padding: 0.9rem 1rem;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: #050505;
        color: #fff;
        font: inherit;
      }

      input::placeholder {
        color: rgba(255, 255, 255, 0.38);
      }

      .actions {
        display: grid;
        gap: 0.75rem;
      }

      button {
        width: 100%;
        padding: 0.95rem 1rem;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: #fff;
        color: #000;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button.secondary {
        background: transparent;
        color: #fff;
      }

      button:disabled {
        opacity: 0.55;
        cursor: progress;
      }

      .status {
        margin: 0;
        min-height: 1.5rem;
        color: rgba(255, 255, 255, 0.7);
      }

      .result {
        display: grid;
        gap: 0.5rem;
        padding: 1rem;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.03);
      }

      .result-label {
        font-size: 0.78rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.6);
      }

      output {
        display: block;
        overflow-wrap: anywhere;
        font-family: 'IBM Plex Mono', 'Cascadia Code', monospace;
        font-size: 0.95rem;
        line-height: 1.5;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
      }

      .links a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.6rem;
        min-height: 2.5rem;
        padding: 0.75rem 1rem;
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: #fff;
        text-decoration: none;
      }

      .links img {
        width: 1rem;
        height: 1rem;
        flex: 0 0 1rem;
      }

      @media (min-width: 40rem) {
        main {
          padding: 2rem;
        }

        .shell {
          padding: 1.75rem;
        }

        .actions {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 39.99rem) {
        .target-demo {
          width: 100%;
        }

        .target-row {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .target-slot,
        .target-box {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="shell">
        <nav class="links" aria-label="Project links">
          <div>
            <a href="https://jsr.io/@sovereignbase/dragonwatch">
              <img src="https://cdn.simpleicons.org/jsr/white" alt="" />
              jsr
            </a>
            <a href="https://www.npmjs.com/package/@sovereignbase/dragonwatch">
              <img src="https://cdn.simpleicons.org/npm/white" alt="" />
              npm
            </a>
            <a href="https://github.com/sovereignbase/dragonwatch">
              <img src="https://cdn.simpleicons.org/github/white" alt="" />
              GitHub
            </a>
          </div>
          <div>
            <a
              class="spec-link"
              href="https://sovereignbase.dev/dragonwatch/docs"
              >see documentation</a
            >
            <a
              class="spec-link"
              href="https://sovereignbase.dev/dragonwatch/spec"
              >read specification</a
            >
          </div>
        </nav>
        <h1></h1>
        <p class="lede"></p>
        <div class="controls"></div>
        <div class="controls"></div>
        <div class="target-demos">
          <section class="target-demo" data-replace-demo>
            <div class="target-row">
              <div class="target-slot">
                <div class="target-box" data-dragged>dragged</div>
              </div>
              <div class="target-slot">
                <div class="target-box" data-target>replace A</div>
              </div>
              <div class="target-slot">
                <div class="target-box" data-target>replace B</div>
              </div>
            </div>
            <button type="button" data-reset>reset</button>
          </section>
          <section class="target-demo" data-append-demo>
            <div class="target-row">
              <div class="target-slot">
                <div class="target-box" data-dragged>dragged</div>
              </div>
              <div class="target-slot">
                <div class="target-box" data-target>append A</div>
              </div>
              <div class="target-slot">
                <div class="target-box" data-target>append B</div>
              </div>
            </div>
            <button type="button" data-reset>reset</button>
          </section>
        </div>
      </section>
    </main>
    <template id="replace-demo-template">
      <div class="target-slot">
        <div class="target-box" data-dragged>dragged</div>
      </div>
      <div class="target-slot">
        <div class="target-box" data-target>replace A</div>
      </div>
      <div class="target-slot">
        <div class="target-box" data-target>replace B</div>
      </div>
    </template>
    <template id="append-demo-template">
      <div class="target-slot">
        <div class="target-box" data-dragged>dragged</div>
      </div>
      <div class="target-slot">
        <div class="target-box" data-target>append A</div>
      </div>
      <div class="target-slot">
        <div class="target-box" data-target>append B</div>
      </div>
    </template>
    <script type="module" src="index.js"></script>
  </body>
</html>
